Categories:
  - Games
License: MIT
AutoName: EDH Counter
SourceCode: https://github.com/vdiorio/EdhCounterRefactor
IssueTracker: https://github.com/vdiorio/EdhCounterRefactor/issues

Description: |-
  Life tracking app for EDH (Magic: The Gathering Commander) games.
  Supports 2-6 players with commander damage, poison, energy, and
  experience counters.

Builds:
  - versionName: '1.0.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - npm ci
    scanignore:
      - node_modules
    gradle:
      - release
    abiSplit: true

AutoUpdateMode: Version +%v
UpdateCheckMode: Tags
