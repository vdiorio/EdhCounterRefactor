    versionCode: 17
    commit: 0f92ed7010eeb370d134a497c538b6bd43ab34fb
    subdir: android
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - apt-get update
      - apt-get install -y npm
    init:
      - cd ..
      - npm ci
      - npx patch-package
    gradle:
      - yes
    output: app/build/outputs/apk/release/*.apk
    scanignore:
      - node_modules/jsc-android/dist
      - node_modules/react-native/sdks/hermesc
    scandelete:
      - node_modules

