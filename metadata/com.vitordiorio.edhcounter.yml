Categories:
  - Games
License: MIT
AutoName: EDH Counter
SourceCode: https://github.com/vdiorio/EdhCounterRefactor
IssueTracker: https://github.com/vdiorio/EdhCounterRefactor/issues

Description: |-
  Life tracking app for EDH (Magic: The Gathering Commander) games.
  Supports 2-6 players with commander damage, poison, energy, and
  experience counters.

Builds:
  - versionName: '1.0.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - curl -Lo node.tar.gz https://nodejs.org/download/release/v19.3.0/node-v19.3.0-linux-x64.tar.gz
      - echo "b525028ae5bb71b5b32cb7fce903ccce261dbfef4c7dd0f3e0ffc27cd6fc0b3f node.tar.gz" | sha256sum -c -
      - tar xzf node.tar.gz --strip-components=1 -C /usr/local/
    init:
      - npm ci
    scanignore:
      - node_modules
    gradle:
      - yes
    abiSplit: true

